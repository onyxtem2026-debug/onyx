name: onyx
description: A next-generation social media platform combining the best of Instagram and TikTok.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.7
  
  # مكتبة تشغيل وبث الفيديوهات القصيرة (Reels) بسلاسة
  video_player: ^2.8.2
  
  # مكتبة معالجة الصور وعرضها من السيرفر مع التخزين المؤقت (Cache)
  cached_network_image: ^3.3.1
  
  # مكتبة الاتصال بالسيرفر وقاعدة البيانات بكفاءة عالية
  dio: ^5.4.0
  
  # مكتبة إدارة حالة التطبيق (State Management) المعتمدة عالمياً
  flutter_bloc: ^8.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
